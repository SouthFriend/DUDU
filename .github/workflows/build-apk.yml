name: 编译车机音乐修复APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 手动触发构建

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 强制用Node.js 24，消除警告

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置JDK 17（适配安卓13编译）
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        check-latest: true # 用最新版JDK

    - name: 授予gradle执行权限
      run: |
        chmod +x ./gradlew
        sudo apt-get update && sudo apt-get install -y android-sdk-build-tools # 补全车机编译依赖

    - name: 清理旧编译缓存
      run: ./gradlew clean

    - name: 编译Release APK（适配嘟嘟梁山S3）
      run: ./gradlew assembleRelease --stacktrace # 输出详细日志，方便排查

    - name: 上传APK到GitHub
      uses: actions/upload-artifact@v4
      with:
        name: CarMusicFix_S3_Android13
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30 # APK保留30天
